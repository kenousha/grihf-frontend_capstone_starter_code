<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign_Up</title>
    <link rel="stylesheet" href="./Sign_Up.css">
</head>
<body>
    <div class="container">
            <div class="signup-text">
                <h1>Sign Up</h1>
            </div>
            <div class="signup-text1">Already a member? 
            <span><a href="../Login/Login.html"> Login</a></span>
            </div>
        <form>
            <div class="form-group">
                <label for="Email">Email</label>
                <input type="Email" name="Email" id="Email" class="form-control" placeholder="Enter your email" aria-describedby="Email input box" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" aria-describedby="Password inbput box" />
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-primary mb-2 mr-1 waves-effect waves-light">Submit</button>
                <button type="reset" class="btn btn-danger mb-2 waves-effect waves-light">Reset</button>
            </div>
            <br />
              <div class="login-text">
                Forgot Password?
              </div>
        </form>
    </div>
</body>
</html>
